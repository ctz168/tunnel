<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunnel 隧道管理</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f172a;--card:#1e293b;--border:#334155;
    --text:#e2e8f0;--text-muted:#94a3b8;--accent:#3b82f6;
    --accent-hover:#2563eb;--danger:#ef4444;--danger-hover:#dc2626;
    --success:#22c55e;--warning:#f59e0b;
    --radius:8px;--shadow:0 4px 24px rgba(0,0,0,.3);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  /* ── Header ── */
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50}
  .header-title{font-size:22px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
  .header-title span.emoji{font-size:26px}
  .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .domain-display{display:flex;align-items:center;gap:8px;background:#0f172a;padding:6px 14px;border-radius:var(--radius);font-size:14px;font-family:"SF Mono",Consolas,"Liberation Mono",Menlo,monospace}
  .domain-display .label{color:var(--text-muted);font-family:inherit}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:background .15s,transform .1s;line-height:1.4}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border);color:var(--text)}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-hover)}
  .btn-sm{padding:5px 10px;font-size:13px}
  .btn-icon{padding:6px 8px;font-size:15px;line-height:1}
  /* ── Main ── */
  .main{max-width:1200px;margin:0 auto;padding:24px 28px 60px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .toolbar h2{font-size:18px;font-weight:600}
  /* ── Table ── */
  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead{background:#162032}
  th{padding:12px 16px;text-align:left;font-weight:600;color:var(--text-muted);white-space:nowrap}
  td{padding:12px 16px;border-top:1px solid var(--border);vertical-align:middle}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-online{background:var(--success);box-shadow:0 0 6px var(--success)}
  .dot-offline{background:#64748b}
  .public-url{display:flex;align-items:center;gap:6px;font-family:"SF Mono",Consolas,monospace;font-size:13px;word-break:break-all}
  .actions-cell{display:flex;gap:6px;flex-wrap:wrap}
  /* ── Empty state ── */
  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .empty .big{font-size:48px;margin-bottom:12px}
  .empty p{font-size:15px;margin-bottom:4px}
  /* ── Traffic ── */
  .traffic{font-size:12px;color:var(--text-muted);white-space:nowrap}
  .traffic b{color:var(--text);font-weight:500}
  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;padding:20px}
  .modal-overlay.active{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
  .modal-header h3{font-size:17px;font-weight:600}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px;line-height:1;border-radius:4px}.modal-close:hover{background:var(--border);color:var(--text)}
  .modal-body{padding:20px 24px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:6px}
  .form-group input,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border .15s}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{resize:vertical;min-height:60px}
  .form-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 24px 20px}
  /* ── Token box ── */
  .token-box{background:#0c2d1a;border:1px solid #166534;border-radius:var(--radius);padding:14px;margin-top:12px}
  .token-box .token-label{font-size:13px;color:var(--success);font-weight:600;margin-bottom:6px}
  .token-box .token-value{font-family:"SF Mono",Consolas,monospace;font-size:14px;word-break:break-all;background:#0f172a;padding:10px 12px;border-radius:6px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .token-box .token-value code{flex:1;white-space:pre-wrap}
  .token-box .warning{margin-top:10px;font-size:12px;color:var(--warning);display:flex;align-items:flex-start;gap:6px}
  /* ── Log viewer ── */
  .log-container{max-height:400px;overflow-y:auto;font-family:"SF Mono",Consolas,monospace;font-size:13px;background:var(--bg);border-radius:var(--radius);padding:4px 0}
  .log-line{padding:6px 12px;border-bottom:1px solid var(--border);display:flex;gap:10px}
  .log-line:last-child{border-bottom:none}
  .log-time{color:var(--text-muted);white-space:nowrap;flex-shrink:0}
  .log-action{color:var(--accent);font-weight:500;white-space:nowrap;flex-shrink:0;min-width:60px}
  .log-msg{color:var(--text);word-break:break-all}
  .log-empty{padding:30px;text-align:center;color:var(--text-muted)}
  /* ── Toast ── */
  .toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;color:#fff;box-shadow:var(--shadow);animation:toastIn .25s ease,toastOut .3s ease 2.7s forwards;pointer-events:auto;max-width:360px;word-break:break-word}
  .toast-success{background:#16a34a}
  .toast-error{background:#dc2626}
  .toast-info{background:#2563eb}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
  @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
  /* ── Confirm dialog ── */
  .confirm-text{font-size:14px;color:var(--text);margin:12px 0 4px;line-height:1.7}
  .confirm-text strong{color:var(--danger)}
  /* ── Domain edit ── */
  .domain-edit-row{display:flex;align-items:center;gap:8px}
  .domain-edit-row input{padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:"SF Mono",Consolas,monospace;width:220px;outline:none}
  .domain-edit-row input:focus{border-color:var(--accent)}
  /* ── Responsive ── */
  @media(max-width:768px){
    .header{padding:14px 16px}
    .main{padding:16px}
    th,td{padding:10px 12px;font-size:13px}
    .modal{max-width:95vw}
    .domain-edit-row input{width:160px}
  }
  /* ── Copy tooltip ── */
  .copy-tip{font-size:11px;color:var(--success);animation:fadeOut .6s .4s forwards}
  @keyframes fadeOut{to{opacity:0}}
  /* scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#475569}
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div class="header-title"><span class="emoji">&#x1F310;</span> Tunnel 隧道管理</div>
  <div class="header-right">
    <div id="domainArea">
      <div class="domain-display">
        <span class="label">&#x1F517; 域名:</span>
        <span id="domainText">{{ domain }}</span>
        <button class="btn btn-ghost btn-icon" onclick="showDomainEdit()" title="编辑域名">&#x270F;&#xFE0F;</button>
      </div>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="toolbar">
    <h2>&#x1F4CA; 隧道列表</h2>
    <button class="btn btn-primary" onclick="openCreateModal()">&#x2795; 创建隧道</button>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>隧道编码</th>
            <th>本地地址</th>
            <th>状态</th>
            <th>流量</th>
            <th>公网地址</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tunnelBody"></tbody>
      </table>
    </div>
    <div id="emptyState" style="display:none">
      <div class="empty">
        <div class="big">&#x1F50C;</div>
        <p>暂无隧道</p>
        <p style="font-size:13px">点击上方"创建隧道"按钮添加第一个隧道</p>
      </div>
    </div>
  </div>
</main>

<!-- Create Tunnel Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <h3>&#x2795; 创建隧道</h3>
      <button class="modal-close" onclick="closeCreateModal()">&times;</button>
    </div>
    <div class="modal-body" id="createFormArea">
      <div class="form-group">
        <label>名称 *</label>
        <input type="text" id="cName" placeholder="例如: my-web">
      </div>
      <div class="form-group">
        <label>本地端口 *</label>
        <input type="number" id="cPort" placeholder="例如: 8080" min="1" max="65535">
      </div>
      <div class="form-group">
        <label>本地地址</label>
        <input type="text" id="cHost" placeholder="localhost" value="localhost">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="cDesc" placeholder="可选，描述该隧道用途"></textarea>
      </div>
    </div>
    <div class="modal-body" id="createResultArea" style="display:none"></div>
    <div class="form-actions" id="createActions">
      <button class="btn btn-ghost" onclick="closeCreateModal()">取消</button>
      <button class="btn btn-primary" id="createSubmitBtn" onclick="createTunnel()">创建</button>
    </div>
  </div>
</div>

<!-- Log Viewer Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-header">
      <h3>&#x1F4CB; 隧道日志</h3>
      <button class="modal-close" onclick="closeLogModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="log-container" id="logContent"><div class="log-empty">加载中...</div></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeLogModal()">关闭</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3>&#x26A0;&#xFE0F; 确认删除</h3>
      <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="confirm-text">确定要删除隧道 <strong id="confirmName"></strong> 吗？此操作不可撤销。</div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeConfirmModal()">取消</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">&#x1F5D1;&#xFE0F; 删除</button>
    </div>
  </div>
</div>

<script>
/* ── Globals ── */
const DOMAIN = "{{ domain }}";
let tunnels = [];
let statusMap = {}; // tunnel_id -> status info

/* ── Helpers ── */
function formatBytes(bytes) {
  if (bytes == null || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  const val = bytes / Math.pow(1024, i);
  return val < 10 ? val.toFixed(2) + ' ' + units[i] : val.toFixed(1) + ' ' + units[i];
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function timestampStr() {
  const now = new Date();
  return now.toLocaleString('zh-CN', { hour12: false });
}

/* ── Toast ── */
function showToast(msg, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3200);
}

/* ── Clipboard ── */
function copyText(text, el) {
  navigator.clipboard.writeText(text).then(function() {
    showToast('已复制: ' + text, 'success');
  }).catch(function() {
    /* Fallback */
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制: ' + text, 'success');
  });
}

/* ── Domain Edit ── */
function showDomainEdit() {
  var area = document.getElementById('domainArea');
  area.innerHTML =
    '<div class="domain-edit-row">' +
      '<input type="text" id="domainInput" value="' + escapeHtml(DOMAIN) + '">' +
      '<button class="btn btn-primary btn-sm" onclick="saveDomain()">保存</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="cancelDomainEdit()">取消</button>' +
    '</div>';
  document.getElementById('domainInput').focus();
}

function cancelDomainEdit() {
  document.getElementById('domainArea').innerHTML =
    '<div class="domain-display">' +
      '<span class="label">&#x1F517; 域名:</span>' +
      '<span id="domainText">' + escapeHtml(DOMAIN) + '</span>' +
      '<button class="btn btn-ghost btn-icon" onclick="showDomainEdit()" title="编辑域名">&#x270F;&#xFE0F;</button>' +
    '</div>';
}

function saveDomain() {
  var val = document.getElementById('domainInput').value.trim();
  if (!val) { showToast('域名不能为空', 'error'); return; }
  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ domain: val })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { showToast(data.error || '保存失败', 'error'); return; }
    showToast('域名已更新', 'success');
    setTimeout(function() { location.reload(); }, 800);
  })
  .catch(function() { showToast('请求失败', 'error'); });
}

/* ── Render Tunnels ── */
function renderTunnels() {
  var tbody = document.getElementById('tunnelBody');
  var empty = document.getElementById('emptyState');

  if (!tunnels || tunnels.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var html = '';
  tunnels.forEach(function(t) {
    var sid = String(t.id);
    var code = t.code || sid;
    var info = statusMap[code] || {};
    var online = info.online ? true : false;
    var pubUrl = 'http://' + DOMAIN + '/' + code;
    var addr = (t.local_host || 'localhost') + ':' + (t.local_port || '');
    var bytesIn = info.bytes_in || 0;
    var bytesOut = info.bytes_out || 0;

    html += '<tr>' +
      '<td><strong>' + escapeHtml(t.name || '-') + '</strong>' +
        (t.description ? '<br><span style="font-size:12px;color:var(--text-muted)">' + escapeHtml(t.description) + '</span>' : '') +
      '</td>' +
      '<td style="font-family:monospace;font-size:13px;color:var(--text-muted)">' + escapeHtml(t.code || sid) + '</td>' +
      '<td style="font-family:monospace;font-size:13px">' + escapeHtml(addr) + '</td>' +
      '<td>' +
        '<span class="status">' +
          '<span class="dot ' + (online ? 'dot-online' : 'dot-offline') + '"></span>' +
          (online ? '在线' : '离线') +
        '</span>' +
      '</td>' +
      '<td class="traffic">' +
        '&#x2B06; <b>' + formatBytes(bytesIn) + '</b><br>&#x2B07; <b>' + formatBytes(bytesOut) + '</b>' +
      '</td>' +
      '<td><div class="public-url">' +
        '<span style="flex:1">' + escapeHtml(pubUrl) + '</span>' +
        '<button class="btn btn-ghost btn-icon btn-sm" onclick="copyText(\'' + escapeHtml(pubUrl).replace(/'/g, "\\'") + '\')" title="复制">&#x1F4CB;</button>' +
      '</div></td>' +
      '<td><div class="actions-cell">' +
        '<button class="btn btn-ghost btn-sm" onclick="openLogModal(\'' + sid + '\',\'' + escapeHtml(t.name || t.code || sid) + '\')">&#x1F4CB; 日志</button>' +
        '<button class="btn btn-danger btn-sm" onclick="confirmDelete(\'' + sid + '\',\'' + escapeHtml(t.name || t.code || sid) + '\')">&#x1F5D1;&#xFE0F;</button>' +
      '</div></td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

/* ── Fetch Tunnels ── */
function fetchTunnels() {
  fetch('/api/tunnels')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      tunnels = data.tunnels || data || [];
      renderTunnels();
    })
    .catch(function() {});
}

/* ── Fetch Tunnel Status ── */
function fetchTunnelStatus() {
  fetch('/api/tunnel-status')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      statusMap = {};
      if (data && data.tunnels && typeof data.tunnels === 'object') {
        /* data.tunnels = { "CODE1": {online, bytes_in, ...}, ... } */
        statusMap = data.tunnels;
      }
      renderTunnels();
    })
    .catch(function() {});
}

/* ── Create Tunnel ── */
function openCreateModal() {
  document.getElementById('createModal').classList.add('active');
  document.getElementById('createFormArea').style.display = '';
  document.getElementById('createResultArea').style.display = 'none';
  document.getElementById('createSubmitBtn').style.display = '';
  document.getElementById('cName').value = '';
  document.getElementById('cPort').value = '';
  document.getElementById('cHost').value = 'localhost';
  document.getElementById('cDesc').value = '';
  document.getElementById('cName').focus();
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('active');
}

function createTunnel() {
  var name = document.getElementById('cName').value.trim();
  var port = parseInt(document.getElementById('cPort').value, 10);
  var host = document.getElementById('cHost').value.trim() || 'localhost';
  var desc = document.getElementById('cDesc').value.trim();

  if (!name) { showToast('请输入隧道名称', 'error'); return; }
  if (!port || port < 1 || port > 65535) { showToast('请输入有效的端口号 (1-65535)', 'error'); return; }

  var btn = document.getElementById('createSubmitBtn');
  btn.disabled = true;
  btn.textContent = '创建中...';

  fetch('/api/tunnels', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, local_port: port, local_host: host, description: desc })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = '创建';
    if (data.error) { showToast(data.error || '创建失败', 'error'); return; }
    showToast('隧道创建成功', 'success');
    fetchTunnels();
    /* Show token result */
    var tunnel = data.tunnel || data;
    document.getElementById('createFormArea').style.display = 'none';
    btn.style.display = 'none';
    var resultArea = document.getElementById('createResultArea');
    var token = tunnel.auth_token || tunnel.token || '';
    resultArea.style.display = '';
    resultArea.innerHTML =
      '<div class="token-box">' +
        '<div class="token-label">&#x1F512; 认证令牌</div>' +
        '<div class="token-value"><code id="tokenCode">' + escapeHtml(token) + '</code>' +
          '<button class="btn btn-primary btn-sm" onclick="copyText(document.getElementById(\'tokenCode\').textContent)">&#x1F4CB; 复制</button>' +
        '</div>' +
        '<div class="warning">&#x26A0;&#xFE0F; 请保存此认证令牌，关闭后将无法再次查看</div>' +
      '</div>';
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = '创建';
    showToast('请求失败，请重试', 'error');
  });
}

/* ── Delete Tunnel ── */
var pendingDeleteId = null;
function confirmDelete(id, name) {
  pendingDeleteId = id;
  document.getElementById('confirmName').textContent = name;
  document.getElementById('confirmModal').classList.add('active');
  document.getElementById('confirmDeleteBtn').onclick = function() { doDelete(); };
}
function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('active');
  pendingDeleteId = null;
}
function doDelete() {
  if (!pendingDeleteId) return;
  fetch('/api/tunnels/' + pendingDeleteId, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      closeConfirmModal();
      if (data.error) { showToast(data.error || '删除失败', 'error'); return; }
      showToast('隧道已删除', 'success');
      fetchTunnels();
    })
    .catch(function() {
      closeConfirmModal();
      showToast('请求失败', 'error');
    });
}

/* ── Log Viewer ── */
var logPollTimer = null;
function openLogModal(id, name) {
  document.getElementById('logModal').classList.add('active');
  document.getElementById('logContent').innerHTML = '<div class="log-empty">加载中...</div>';
  fetchLogs(id);
  if (logPollTimer) clearInterval(logPollTimer);
  logPollTimer = setInterval(function() { fetchLogs(id); }, 5000);
  document.getElementById('logModal')._tunnelId = id;
}
function closeLogModal() {
  document.getElementById('logModal').classList.remove('active');
  if (logPollTimer) { clearInterval(logPollTimer); logPollTimer = null; }
}
function fetchLogs(id) {
  fetch('/api/tunnels/' + id + '/logs')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var container = document.getElementById('logContent');
      var logs = data.logs || data || [];
      if (!Array.isArray(logs) || logs.length === 0) {
        container.innerHTML = '<div class="log-empty">暂无日志</div>';
        return;
      }
      var html = '';
      logs.forEach(function(l) {
        html += '<div class="log-line">' +
          '<span class="log-time">' + escapeHtml(l.created_at || l.timestamp || '-') + '</span>' +
          '<span class="log-action">' + escapeHtml(l.action || '-') + '</span>' +
          '<span class="log-msg">' + escapeHtml(l.message || l.msg || '-') + '</span>' +
        '</div>';
      });
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    })
    .catch(function() {
      document.getElementById('logContent').innerHTML = '<div class="log-empty">加载失败</div>';
    });
}

/* ── Close modals on overlay click ── */
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      overlay.classList.remove('active');
      if (logPollTimer) { clearInterval(logPollTimer); logPollTimer = null; }
    }
  });
});

/* ── Close modals on Escape ── */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(function(m) {
      m.classList.remove('active');
    });
    if (logPollTimer) { clearInterval(logPollTimer); logPollTimer = null; }
  }
});

/* ── Init ── */
fetchTunnels();
fetchTunnelStatus();
setInterval(fetchTunnels, 5000);
setInterval(fetchTunnelStatus, 5000);
</script>
