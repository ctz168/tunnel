<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunnel Test - OK!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 60px;
    text-align: center;
    max-width: 600px;
    width: 90%;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  }
  .checkmark {
    width: 100px; height: 100px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 50px;
    box-shadow: 0 0 40px rgba(34,197,94,0.5);
  }
  h1 { font-size: 32px; margin-bottom: 12px; }
  .sub { font-size: 18px; opacity: 0.85; margin-bottom: 30px; }
  .info {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.8;
    text-align: left;
  }
  .info span { color: #86efac; font-weight: 600; }
  .footer { margin-top: 30px; font-size: 13px; opacity: 0.6; }
</style>
</head>
<body>
<div class="card">
  <div class="checkmark">&#x2714;</div>
  <h1>Tunnel works!</h1>
  <p class="sub">Your tunnel connection is successful</p>
  <div class="info">
    <p>This page is served from <span>your local machine</span>, proxied through the tunnel server to the public internet.</p>
    <p style="margin-top:10px">Time: <span id="clock"></span></p>
    <p>Server: <span>aicq.online:7739</span></p>
  </div>
  <p class="footer">Powered by Tunnel &copy; 2025</p>
</div>
<script>
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', {hour12: false});
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
